<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" 
        content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" 
        href="https://fonts.googleapis.com">
    <link rel="preconnect" 
        href="https://fonts.gstatic.com" 
        crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" 
        rel="stylesheet">
    <link rel="stylesheet" 
        href="../css/style.css">
    <title>Tam.Ion</title>
</head>

<body id="top">    
    <!-- HEADER -->
    <header>
        <div class="container">
            <div class="logo">
                <a href="../index.html">Tam<span>.</span>Ion</a>
            </div>
            <!-- HAMBURGER TOGGLE -->
            <input type="checkbox" 
                    id="menu-toggle" 
                    class="menu-checkbox">
            <label for="menu-toggle" 
                    class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </label>
            <nav class="menu">
                <a href="destination.html">Destinations</a>
                <a href="about.html">About</a>
                <a href="contact-us.html">Contact</a>
                <a href="sign-up.html" class="active"><span>Sign Up</span></a>
            </nav>
        </div>
    </header>
    <!-- MAIN -->
    <main>
        <section class="sign-up-container">
            <!-- SIGN UP CARD -->
            <article class="sign-up-card">
                <header>
                    <h1>Sign Up!</h1>
                </header>
                <br>
                <p>Create your Tamion account and start planning your next unforgettable journey with ease.</p>
                <br>
                <form action="#" method="post">
                    <br>
                    <!-- NAME ROW -->
                    <div class="name-row">                        
                        <div class="input-group">
                            <label for="fname">First Name:</label>
                            <input type="text" id="fname" name="fname" placeholder="Your Name" required>
                        </div>
                        <div class="input-group">
                            <label for="lname">Last Name:</label>
                            <input type="text" id="lname" name="lname" placeholder="Your Last Name" required>
                        </div>
                    </div>
                    <br>
                    <!-- EMAIL -->
                    <div class="input-group">
                        <label for="email">Email:</label>
                        <input type="email" id="email" name="email" placeholder="Your Email" required>
                    </div>
                    <br><br>
                    <!-- BUTTON -->
                    <button type="submit">Sign up!</button>
                </form>            
            </article>
            <!-- SIGN IN CARD -->
            <article class="sign-up-card">
                <header>
                    <h1>Sign in!</h1>
                </header>
                <br>
                <p>Welcome back! Sign in to continue exploring and managing your travel experiences with Tamion.</p>
                <br><br>
                
                <form action="#" method="post">
                    <div class="input-group">
                        <label for="username">Username:</label>
                        <input type="text" id="username" name="username" placeholder="Your Name" required>
                    </div>
                    <br>
                    <div class="input-group">
                        <label for="password">Password:</label>
                        <input type="password" id="password" name="password" placeholder="Your Password" required>
                    </div>
                    <br><br>
                    <button type="submit">Sign in!</button>
                </form>
            </article>
        </section>
        <a href="#top">
            <img src="../images/top.png" class="back-to-top" alt="back to top button">
        </a> 
    </main>

    <!-- FOOTER -->
    <footer>
        <div class="container">
            <small>Copyright &copy; 2026 Tammy &amp; Ioannis.</small>
        </div>
    </footer>
</body>
</html>
