<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" 
        content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" 
        href="https://fonts.googleapis.com">
    <link rel="preconnect" 
        href="https://fonts.gstatic.com" 
        crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" 
        rel="stylesheet">
    <link rel="stylesheet" 
        href="../css/style.css">
    <title>Tam.Ion</title>
</head>
<body>
    
    <!-- HEADER SECTION -->
    <header>
        <div class="container">
            <div class="logo"><a href="../index.html">Tam<span>.</span>Ion</a></div>
            <nav class="menu">
                <a href="destination.html">Destinations</a>
                <a href="about.html">About</a>
                <a href="contact-us.html">Contact</a>
                <a href="sign-up.html" class="active"><span>Sign Up</span></a>
            </nav>
        </div>
    </header>

    <!-- MAIN SECTION -->
    <main>
        <div class="sign-up-container">
            <div class="input-container">
                <h2>Sign Up!</h2>
                <br>
                <p>Create your Tamion account and start planning your next unforgettable journey with ease.</p>
                <br>
                <form action="#" method="post">
                    <br>
                    <!-- NAME ROW (NEW WRAPPER) -->
                    <div class="name-row">                        
                        <div class="input-group">
                            <label for="fname">First Name:</label>
                            <input type="text" id="fname" name="fname" placeholder="Your Name" required>
                        </div>
                        <div class="input-group">
                            <label for="lname">Last Name:</label>
                            <input type="text" id="lname" name="lname" placeholder="Your Last Name" required>
                        </div>
                    </div>
                    <br>
                    <!-- EMAIL -->
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" placeholder="Your Email" required>

                    <br><br>

                    <!-- SEND BUTTON -->
                    <button type="submit">Sign up!</button>

                </form>            
            </div>
            <div class="input-container">
                <h2>Sign in!</h2>
                <br>
                <p>Welcome back! Sign in to continue exploring and managing your travel experiences with Tamion.</p>
                <br><br>
                
                <form action="#" method="post">
                    <!-- FIRST NAME -->
                    <label for="username">Username:</label>
                    <input type="text" id="username" name="username" placeholder="Your Name" required>
                    <br><br>
                    <!-- LAST NAME -->
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" placeholder="Your Password" required>
                    <br><br>
                    <!-- SEND BUTTON -->
                    <button type="submit">Sign in!</button>
                </form>
            </div>
        </div>
    </main>

    <!-- FOOTER SECTION -->
    <footer>
        Copyright &copy; 2026 Tammy &amp; Ioannis.
    </footer>

</body>
</html>
